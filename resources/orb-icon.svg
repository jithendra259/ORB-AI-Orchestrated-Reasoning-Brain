<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Brain outline -->
  <circle cx="50" cy="45" r="30" fill="none" stroke="currentColor" stroke-width="2"/>
  
  <!-- Brain lobes -->
  <path d="M 35 30 Q 30 25 28 35 Q 25 40 30 42" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <path d="M 65 30 Q 70 25 72 35 Q 75 40 70 42" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Center neural connection -->
  <circle cx="50" cy="45" r="4" fill="currentColor"/>
  
  <!-- Neural network lines -->
  <line x1="50" y1="45" x2="35" y2="35" stroke="currentColor" stroke-width="1" opacity="0.6"/>
  <line x1="50" y1="45" x2="65" y2="35" stroke="currentColor" stroke-width="1" opacity="0.6"/>
  <line x1="50" y1="45" x2="35" y2="60" stroke="currentColor" stroke-width="1" opacity="0.6"/>
  <line x1="50" y1="45" x2="65" y2="60" stroke="currentColor" stroke-width="1" opacity="0.6"/>
  
  <!-- Neural nodes -->
  <circle cx="35" cy="35" r="2" fill="currentColor" opacity="0.6"/>
  <circle cx="65" cy="35" r="2" fill="currentColor" opacity="0.6"/>
  <circle cx="35" cy="60" r="2" fill="currentColor" opacity="0.6"/>
  <circle cx="65" cy="60" r="2" fill="currentColor" opacity="0.6"/>
  
  <!-- Orbital ring (gear-like) -->
  <circle cx="50" cy="45" r="38" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4" stroke-dasharray="5,3"/>
</svg>
